; ============================================================
; Winappx.ini — FluentTweaker bloatware database
; Format per section:
;   Category=       app group shown in the left panel
;   PackageName=    matches the Name field from Get-AppxPackage
;   Description=    shown in the detail pane (keep it short)
;   DefaultSelected=true|false
; ============================================================


; MICROSOFT
; ============================================================

[Cortana]
Category=Microsoft
PackageName=Microsoft.549981C3F5F10
Description=Cortana voice assistant. Largely unused since Microsoft demoted it in Windows 11. Removing it does not affect Windows Search.
DefaultSelected=false

[Bing Weather]
Category=Microsoft
PackageName=Microsoft.BingWeather
Description=Bing Weather app. Windows 11 already shows weather in the taskbar widget.
DefaultSelected=false

[Bing News]
Category=Microsoft
PackageName=Microsoft.BingNews
Description=Microsoft's Bing-powered news feed app, often replaced by Microsoft Start on newer installs.
DefaultSelected=true

[Microsoft Start]
Category=Microsoft
PackageName=Microsoft.BingSearch
Description=Microsoft Start / Bing search panel bundled with Windows 11. Replaced Bing News on recent machines.
DefaultSelected=false

[Windows Maps]
Category=Microsoft
PackageName=Microsoft.WindowsMaps
Description=Built-in Maps app. Most people use their browser for maps.
DefaultSelected=false

[Mail and Calendar]
Category=Microsoft
PackageName=microsoft.windowscommunicationsapps
Description=The classic Windows Mail and Calendar app. Deprecated by Microsoft in favour of the new Outlook app.
DefaultSelected=false

[Feedback Hub]
Category=Microsoft
PackageName=Microsoft.WindowsFeedbackHub
Description=App for submitting bug reports and feedback to Microsoft. Remove if you're not in the Windows Insider program.
DefaultSelected=false

[Get Help]
Category=Microsoft
PackageName=Microsoft.GetHelp
Description=Windows Get Help app that connects to Microsoft support. Remove if you never use it.
DefaultSelected=false

[Get Started]
Category=Microsoft
PackageName=Microsoft.Getstarted
Description=Windows onboarding and Tips app shown after a fresh install. Safe to remove once you're set up.
DefaultSelected=true

[Mixed Reality Portal]
Category=Microsoft
PackageName=Microsoft.MixedReality.Portal
Description=Launcher for Windows Mixed Reality VR headsets. Safe to remove if you don't own one.
DefaultSelected=true

[3D Viewer]
Category=Microsoft
PackageName=Microsoft.Microsoft3DViewer
Description=3D model viewer bundled with Windows 10. Rarely used.
DefaultSelected=true

[Paint 3D]
Category=Microsoft
PackageName=Microsoft.MSPaint
Description=Paint 3D — the 3D-capable successor to classic Paint. Removing this does not affect classic MS Paint.
DefaultSelected=false

[Print 3D]
Category=Microsoft
PackageName=Microsoft.Print3D
Description=Print 3D app for 3D printers. Remove unless you have a 3D printer connected to this machine.
DefaultSelected=true

[Alarms and Clock]
Category=Microsoft
PackageName=Microsoft.WindowsAlarms
Description=Windows Alarms and Clock app. Remove if you don't use PC alarms.
DefaultSelected=false

[Camera]
Category=Microsoft
PackageName=Microsoft.WindowsCamera
Description=Windows Camera app. Remove if your machine has no webcam or you use another camera app.
DefaultSelected=false

[Voice Recorder]
Category=Microsoft
PackageName=Microsoft.WindowsSoundRecorder
Description=Windows Sound Recorder. Remove if you use a different recording tool.
DefaultSelected=false

[Sticky Notes]
Category=Microsoft
PackageName=Microsoft.MicrosoftStickyNotes
Description=Digital sticky notes synced to Microsoft account. Remove if you don't use them.
DefaultSelected=false

[Microsoft Wallet]
Category=Microsoft
PackageName=Microsoft.Wallet
Description=Microsoft Wallet / Tap to Pay infrastructure. Rarely used on desktops.
DefaultSelected=true

[Messaging]
Category=Microsoft
PackageName=Microsoft.Messaging
Description=Messaging app leftover from Windows 10 Mobile era. No longer functional on modern Windows.
DefaultSelected=true

[Family Safety]
Category=Microsoft
PackageName=MicrosoftCorporationII.MicrosoftFamily
Description=Parental controls and family screen-time tracking. Safe to remove for adults without children.
DefaultSelected=false

[Power Automate]
Category=Microsoft
PackageName=Microsoft.PowerAutomateDesktop
Description=Desktop automation tool aimed at enterprise users. Remove if you don't use it.
DefaultSelected=false

[Microsoft To Do]
Category=Microsoft
PackageName=Microsoft.Todos
Description=Microsoft's task manager app. Remove if you use another tool.
DefaultSelected=false

[People]
Category=Microsoft
PackageName=Microsoft.People
Description=Contacts app that was integrated with Mail and Calendar in Windows 10. Mostly redundant now.
DefaultSelected=false

[Microsoft Whiteboard]
Category=Microsoft
PackageName=Microsoft.Whiteboard
Description=Digital whiteboard app. Useful mainly for touchscreen and Surface devices.
DefaultSelected=false

[Dev Home]
Category=Microsoft
PackageName=Microsoft.Windows.DevHome
Description=Microsoft's developer dashboard app. Remove if you don't use it for project management.
DefaultSelected=false

[Microsoft Copilot]
Category=Microsoft
PackageName=Microsoft.Copilot
Description=Microsoft Copilot AI assistant app. Remove if you prefer not having it.
DefaultSelected=false

[Phone Link]
Category=Microsoft
PackageName=Microsoft.YourPhone
Description=Links your Android phone to Windows for notifications and file sharing. Remove if you don't use this feature.
DefaultSelected=false


; OFFICE
; ============================================================

[Office Hub]
Category=Office
PackageName=Microsoft.MicrosoftOfficeHub
Description=Promotional app that nudges you toward a Microsoft 365 subscription. No real function if you already have Office.
DefaultSelected=true

[OneNote]
Category=Office
PackageName=Microsoft.Office.OneNote
Description=The Store version of OneNote. The desktop version installed with Office is separate and unaffected.
DefaultSelected=false

[OneDrive]
Category=Office
PackageName=Microsoft.OneDriveSync
Description=The Store version of OneDrive. The desktop sync client (in system tray) is separate and not removed here.
DefaultSelected=false

[Skype]
Category=Office
PackageName=Microsoft.SkypeApp
Description=Consumer Skype app bundled with Windows. Remove if you don't actively use Skype.
DefaultSelected=true

[Microsoft Teams]
Category=Office
PackageName=MicrosoftTeams
Description=The personal Teams app bundled with Windows — not the work/school Teams installed separately.
DefaultSelected=false

[Clipchamp]
Category=Office
PackageName=Clipchamp.Clipchamp
Description=Microsoft's in-browser video editor, bundled since Windows 11 22H2. Remove if you prefer other tools.
DefaultSelected=false


; MEDIA
; ============================================================

[Groove Music]
Category=Media
PackageName=Microsoft.ZuneMusic
Description=Groove Music player — discontinued by Microsoft. Still present on older Windows 10 installs.
DefaultSelected=true

[Movies and TV]
Category=Media
PackageName=Microsoft.ZuneVideo
Description=Windows Movies and TV app for playing local video. Remove if you use VLC, MPC-HC, or another player.
DefaultSelected=false

[Spotify]
Category=Media
PackageName=SpotifyAB.SpotifyMusic
Description=Spotify Store app. Remove if you installed Spotify from their website or don't use it.
DefaultSelected=false

[Netflix]
Category=Media
PackageName=4DF9E0F8.Netflix
Description=Netflix Store app, sometimes pre-installed by manufacturers. Remove if you prefer the browser.
DefaultSelected=false


; GAMING
; ============================================================

[Xbox Game Bar]
Category=Gaming
PackageName=Microsoft.XboxGamingOverlay
